<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign in or join myPL to customize your Premier League experience.">
    <title>Sign in - Premier League Clone</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom Style -->
    <link rel="stylesheet" href="../CSS/signin.css">
</head>

<body>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5">
                
                <!-- Back Link -->
                <div class="mb-4">
                    <a href="home.html" class="text-white-50 text-decoration-none small">
                        <i class="bi bi-arrow-left me-1"></i> Back to Home
                    </a>
                </div>

                <!-- Main Login Card -->
                <div class="login-card">
                    
                    <!-- Logo Header -->
                    <div class="logo-header text-center mb-4">
                        <a href="home.html" class="text-decoration-none d-inline-flex align-items-center gap-2">
                            <img src="https://cdn.jsdelivr.net/npm/simple-icons@latest/icons/premierleague.svg" alt="Premier League Logo" style="filter: brightness(0) invert(1);">
                            <span class="text-white">Premier League</span>
                        </a>
                    </div>

                    <!-- Authentication Tabs -->
                    <ul class="nav nav-pills nav-fill nav-pills-custom mb-4" id="authTab">
                        <li class="nav-item">
                            <button class="nav-link active" id="tabSignInBtn" type="button">Sign In</button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link" id="tabJoinBtn" type="button">Join myPL</button>
                        </li>
                    </ul>

                    <!-- Form Title -->
                    <h2 class="h4 fw-bold text-center mb-4" id="formTitle">Sign in</h2>

                    <!-- Credentials Form -->
                    <form id="authForm" novalidate>
                        
                        <div class="mb-3">
                            <label class="form-label" for="emailInput">Email Address</label>
                            <input class="form-control" type="email" id="emailInput" placeholder="Enter your email" required>
                        </div>

                        <div class="mb-3" id="passwordGroup">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <label class="form-label mb-0" for="passwordInput">Password</label>
                                <a href="#" class="text-accent text-decoration-none small" id="forgotPasswordLink">Forgot password?</a>
                            </div>
                            <div class="input-group">
                                <input class="form-control" type="password" id="passwordInput" placeholder="••••••••" required>
                                <button type="button" class="btn btn-outline-secondary" id="passwordToggleBtn">
                                    <i class="bi bi-eye-slash" id="passwordToggleIcon"></i>
                                </button>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-accent w-100 fw-bold py-2.5 mt-2" id="submitBtn">Sign in</button>

                    </form>

                    <!-- Divider -->
                    <div class="d-flex align-items-center my-4 text-white-50">
                        <hr class="flex-grow-1 border-secondary m-0">
                        <span class="mx-3 small fw-bold">OR</span>
                        <hr class="flex-grow-1 border-secondary m-0">
                    </div>

                    <!-- Social Login List -->
                    <div class="d-grid gap-2">
                        <button type="button" class="btn btn-outline-light d-flex align-items-center justify-content-center gap-2 py-2">
                            <i class="bi bi-google"></i>
                            <span id="googleBtnText">Sign in with Google</span>
                        </button>
                        <button type="button" class="btn btn-outline-light d-flex align-items-center justify-content-center gap-2 py-2">
                            <i class="bi bi-facebook"></i>
                            <span id="facebookBtnText">Sign in with Facebook</span>
                        </button>
                        <button type="button" class="btn btn-outline-light d-flex align-items-center justify-content-center gap-2 py-2">
                            <i class="bi bi-twitter-x"></i>
                            <span id="twitterBtnText">Sign in with X</span>
                        </button>
                        <button type="button" class="btn btn-outline-light d-flex align-items-center justify-content-center gap-2 py-2">
                            <i class="bi bi-apple"></i>
                            <span id="appleBtnText">Sign in with Apple</span>
                        </button>
                    </div>

                    <!-- Footer Help Links -->
                    <div class="text-center mt-4 small text-white-50" id="footerTextContainer">
                        <p id="problemsLink" class="mb-2">
                            <a href="#" class="text-white text-decoration-underline">Problems signing in? Contact us</a>
                        </p>
                        <p id="toggleAccountLink" class="mb-0">
                            Don't have an account? <a id="linkToRegister" class="text-accent text-decoration-none fw-bold cursor-pointer">Register now!</a>
                        </p>
                    </div>

                </div>

            </div>
        </div>
    </div>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    
    <!-- Custom jQuery Tab & UI Switcher -->
    <script>
        $(document).ready(function () {
            const $tabSignInBtn = $('#tabSignInBtn');
            const $tabJoinBtn = $('#tabJoinBtn');
            const $formTitle = $('#formTitle');
            const $passwordGroup = $('#passwordGroup');
            const $passwordInput = $('#passwordInput');
            const $submitBtn = $('#submitBtn');
            const $googleBtnText = $('#googleBtnText');
            const $facebookBtnText = $('#facebookBtnText');
            const $twitterBtnText = $('#twitterBtnText');
            const $appleBtnText = $('#appleBtnText');
            const $problemsLink = $('#problemsLink');
            const $toggleAccountLink = $('#toggleAccountLink');
            
            const $passwordToggleBtn = $('#passwordToggleBtn');
            const $passwordToggleIcon = $('#passwordToggleIcon');

            // Password eye visibility toggle
            $passwordToggleBtn.on('click', function () {
                if ($passwordInput.attr('type') === 'password') {
                    $passwordInput.attr('type', 'text');
                    $passwordToggleIcon.removeClass('bi-eye-slash').addClass('bi-eye');
                } else {
                    $passwordInput.attr('type', 'password');
                    $passwordToggleIcon.removeClass('bi-eye').addClass('bi-eye-slash');
                }
            });

            function showSignIn() {
                $tabSignInBtn.addClass('active');
                $tabJoinBtn.removeClass('active');
                $formTitle.text('Sign in');
                $passwordGroup.show();
                $passwordInput.attr('required', 'required');
                $submitBtn.text('Sign in');
                $googleBtnText.text('Sign in with Google');
                $facebookBtnText.text('Sign in with Facebook');
                $twitterBtnText.text('Sign in with X');
                $appleBtnText.text('Sign in with Apple');
                $problemsLink.show();
                $toggleAccountLink.html("Don't have an account? <a id='linkToRegister' class='text-accent text-decoration-none fw-bold cursor-pointer'>Register now!</a>");
                
                // Re-bind click event to dynamically replaced element
                $('#linkToRegister').on('click', showJoin);
            }

            function showJoin() {
                $tabJoinBtn.addClass('active');
                $tabSignInBtn.removeClass('active');
                $formTitle.text('Join myPL');
                $passwordGroup.hide();
                $passwordInput.removeAttr('required');
                $submitBtn.text('Join with email');
                $googleBtnText.text('Join with Google');
                $facebookBtnText.text('Join with Facebook');
                $twitterBtnText.text('Join with X');
                $appleBtnText.text('Join with Apple');
                $problemsLink.hide();
                $toggleAccountLink.html("Have an account? <a id='linkToSignIn' class='text-accent text-decoration-none fw-bold cursor-pointer'>Sign in here</a>");
                
                // Re-bind click event to dynamically replaced element
                $('#linkToSignIn').on('click', showSignIn);
            }

            // Tab-click event listeners
            $tabSignInBtn.on('click', showSignIn);
            $tabJoinBtn.on('click', showJoin);
            
            // Initial click listener for the register link in footer
            $(document).on('click', '#linkToRegister', showJoin);
        });
    </script>
</body>

</html>
