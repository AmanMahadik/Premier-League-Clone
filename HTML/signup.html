<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Register or join myPL to customize your Premier League experience.">
    <title>Register - Premier League Clone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../CSS/signin.css">
</head>

<body>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5">

                <div class="mb-4">
                    <a href="home.html" class="text-white-50 text-decoration-none small">
                        <i class="bi bi-arrow-left me-1"></i> Back to Home
                    </a>
                </div>

                <div class="login-card">

                    <div class="logo-header text-center mb-4">
                        <a href="home.html" class="text-decoration-none d-inline-flex align-items-center gap-2">
                            <img src="https://cdn.jsdelivr.net/npm/simple-icons@latest/icons/premierleague.svg"
                                alt="Premier League Logo" style="filter: brightness(0) invert(1);">
                            <span class="text-white">Premier League</span>
                        </a>
                    </div>

                    <h2 class="h4 fw-bold text-center mb-4" id="formTitle">Register</h2>

                    <form id="authForm" novalidate>

                        <div class="mb-3">
                            <label class="form-label" for="emailInput">Email Address</label>
                            <input class="form-control" type="email" id="emailInput" placeholder="Enter your email"
                                required>
                        </div>

                        <div class="mb-3" id="passwordGroup">
                            <label class="form-label mb-2" for="passwordInput">Password</label>
                            <div class="input-group">
                                <input class="form-control" type="password" id="passwordInput" required>
                                <button type="button" class="btn btn-outline-secondary" id="passwordToggleBtn">
                                    <i class="bi bi-eye-slash" id="passwordToggleIcon"></i>
                                </button>
                            </div>
                        </div>

                        <div class="mb-3" id="confirmPasswordGroup">
                            <label class="form-label mb-2" for="confirmPasswordInput">Confirm Password</label>
                            <div class="input-group">
                                <input class="form-control" type="password" id="confirmPasswordInput" required>
                                <button type="button" class="btn btn-outline-secondary" id="confirmPasswordToggleBtn">
                                    <i class="bi bi-eye-slash" id="confirmPasswordToggleIcon"></i>
                                </button>
                            </div>
                        </div>

                        <div class="mb-3 p-3 bg-black bg-opacity-25 rounded" id="passwordCriteriaContainer">
                            <center>
                                <div id="passwordHelp">
                                    <i class="bi bi-x-circle-fill me-2"></i>8-20 characters long
                                </div>
                                <div id="capital">
                                    <i class="bi bi-x-circle-fill me-2"></i>At least one uppercase letter
                                </div>
                                <div id="number">
                                    <i class="bi bi-x-circle-fill me-2"></i>At least one number
                                </div>
                                <div id="special">
                                    <i class="bi bi-x-circle-fill me-2"></i>At least one special character
                                </div>
                            </center>
                        </div>

                        <button type="submit" class="btn btn-accent w-100 fw-bold py-2.5 mt-2"
                            id="submitBtn">Register</button>

                    </form>

                    <div class="text-center mt-4 small text-white-50" id="footerTextContainer">
                        <p id="problemsLink" class="mb-2">
                            <a href="#" class="text-white text-decoration-underline">Problems registering? Contact
                                us</a>
                        </p>
                        <p id="toggleAccountLink" class="mb-0">
                            Already have an account? <a href="signin.html"
                                class="text-accent text-decoration-none fw-bold">Sign in!</a>
                        </p>
                    </div>

                </div>

            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../SCRIPT/form.js"></script>
</body>

</html>
